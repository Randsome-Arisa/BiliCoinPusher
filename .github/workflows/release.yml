name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: bash scripts/package.sh
            name: linux-x64
          - os: windows-latest
            script: scripts/package.bat
            name: win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmmirror.com

      - run: npm ci

      - name: Package
        run: ${{ matrix.script }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilicoinpusher-${{ matrix.name }}
          path: release/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bilicoinpusher-*
          path: release
          merge-multiple: true

      - run: |
          ls -la release/
          gh release create "$GITHUB_REF_NAME" release/*.zip --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
